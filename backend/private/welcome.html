<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Welcome – Shreshtha</title>

<!-- Auth0 scripts (guard to ensure login) -->
<script src="/auth0-spa-js.production.js"></script>
<script src="/auth-init.js?v=7" defer></script>
<script src="/guard-auth.js?v=7" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">

<style>
  body{
    margin:0;
    background:linear-gradient(135deg,#FFE7DA,#FFB59E 48%,#FF6B6B);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:"Italianno",cursive;
    color:#6e2430;
    text-align:center;
  }
  h1{
    font-size:48px;
    text-shadow:0 2px 12px rgba(0,0,0,.25);
    margin-bottom:40px;
    padding:0 12px;
  }
  a.enter-btn{
    font-family:sans-serif;
    font-size:20px;
    background:#6e2430;
    color:#fff;
    padding:14px 32px;
    border-radius:40px;
    text-decoration:none;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
    transition:transform .2s;
  }
  a.enter-btn:hover{ transform:scale(1.06); }

  /* hidden warm-up trigger (optional manual click if needed) */
  button#warm-btn{
    display:none;
    margin-top:20px;
    padding:10px 22px;
    font-size:16px;
    border:none;
    border-radius:28px;
    background:#6e2430;
    color:#fff;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    cursor:pointer;
  }
</style>
</head>
<body>

  <h1>Welcome to Shreshtha’s Life of Happiness</h1>
  <a href="life.html" class="enter-btn">Enter Memories</a>
  <button id="warm-btn">Wake Up Server</button>

<script>
/* Automatically ping the backend to avoid long cold-start delays */
(async()=>{
  try {
    await fetch("/health",{mode:"no-cors"});
  } catch(e) {
    console.warn("Warm-up ping failed:",e);
    // if needed, you can unhide the manual button for retry
    document.getElementById("warm-btn").style.display="inline-block";
  }
})();

/* Manual warm-up if backend was sleeping */
document.getElementById("warm-btn").addEventListener("click",async()=>{
  try{
    await fetch("/health",{mode:"no-cors"});
    alert("Server warmed up!");
  }catch(e){alert("Still waking…");}
});
</script>

<!-- START: site-wide background music widget (inserted automatically) -->
<audio id="bgMusic" src="/gallery-music.mp3" loop preload="metadata"></audio>
<div id="musicWidget" style="position:fixed;right:18px;bottom:18px;z-index:9999;">
  <button id="musicPlayBtn" aria-label="Play or Pause" style="background:#6e2430;color:#fff;border:0;border-radius:999px;padding:8px 12px;cursor:pointer;font-weight:700;">▶</button>
  <input id="musicVol" type="range" min="0" max="1" step="0.05" value="1" title="Volume" style="vertical-align:middle;margin-left:8px;">
</div>
<script>
(function(){
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicPlayBtn');
  const vol = document.getElementById('musicVol');
  const KEY = 'shree_bg_music_v1';
  try {
    const saved = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (saved) {
      if (typeof saved.currentTime === 'number') {
        audio.addEventListener('loadedmetadata', () => {
          if (saved.currentTime < audio.duration - 1) audio.currentTime = saved.currentTime;
        }, { once: true });
      }
      if (typeof saved.volume === 'number') { audio.volume = saved.volume; vol.value = saved.volume; }
      if (saved.playing) {
        audio.play().then(()=> btn.textContent='⏸').catch(()=> btn.textContent='▶');
      } else { btn.textContent='▶'; }
    } else { btn.textContent='▶'; }
  } catch(e){ btn.textContent='▶'; }
  btn.addEventListener('click', async (e) => {
    e.preventDefault();
    if (audio.paused) { try { await audio.play(); btn.textContent='⏸'; saveState(true); } catch(err){ console.warn('Autoplay blocked', err); } }
    else { audio.pause(); btn.textContent='▶'; saveState(false); }
  });
  vol.addEventListener('input', (e)=>{ audio.volume = Number(e.target.value); saveState(!audio.paused); e.stopPropagation(); });
  let saveTimer = null;
  function startSaver(){ if(saveTimer) return; saveTimer = setInterval(()=> saveState(!audio.paused),1500); }
  function stopSaver(){ if(saveTimer){ clearInterval(saveTimer); saveTimer = null; } }
  function saveState(isPlaying){ try { localStorage.setItem(KEY, JSON.stringify({ currentTime: audio.currentTime||0, volume: audio.volume||1, playing: !!isPlaying, ts: Date.now() })); } catch(e){} }
  audio.addEventListener('play', startSaver);
  audio.addEventListener('pause', stopSaver);
  window.addEventListener('beforeunload', ()=> saveState(!audio.paused));
  audio.addEventListener('playing', ()=> btn.textContent='⏸');
  audio.addEventListener('pause', ()=> btn.textContent='▶');
})();
</script>
<!-- END: site-wide background music widget -->
</body>
</html>
