<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Upload Memory – Shreshtha</title>

<!-- Auth & guards -->
<script src="/auth0-spa-js.production.js"></script>
<script src="auth-init.js" defer></script>
<script src="guard-auth.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Italianno&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#FFE7DA; --peach:#FFB59E; --red:#FF6B6B;
    --text:#6e2430; --panel:rgba(255,255,255,.05);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:"Playfair Display",serif;
    color:var(--text);
    background:linear-gradient(135deg,var(--cream),var(--peach) 48%,var(--red));
    overflow-x:hidden;
  }
  header{text-align:center;padding:24px 12px;position:relative;z-index:5;}
  .logo{font-family:"Italianno",cursive;font-size:46px;text-shadow:0 2px 10px rgba(0,0,0,.25);}
  nav{margin-top:8px;}
  nav a{margin:0 12px;padding:8px 18px;background:rgba(255,255,255,.15);
        border-radius:999px;text-decoration:none;color:var(--text);
        box-shadow:0 4px 8px rgba(0,0,0,.18);}
  nav a:hover{background:rgba(255,255,255,.3);}
  main{max-width:600px;margin:50px auto;padding:0 18px;position:relative;z-index:5;}

  form{
    background:rgba(255,255,255,.15);
    padding:28px 22px;
    border-radius:18px;
    box-shadow:0 8px 28px rgba(0,0,0,.25);
    backdrop-filter:blur(6px);
  }
  label{display:block;margin:14px 0 6px;font-weight:600;}
  input[type=file],textarea{
    width:100%;padding:12px;
    border-radius:10px;border:1px solid #ccc;font-size:15px;
  }
  textarea{resize:vertical;min-height:80px;}
  button{
    margin-top:20px;padding:14px 28px;
    background:#6e2430;color:#fff;border:none;
    border-radius:40px;font-size:16px;
    cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25);
  }
  button:hover{background:#922f45;}

  .progress{margin-top:16px;width:100%;height:8px;
    background:#ddd;border-radius:6px;overflow:hidden;display:none;}
  .progress div{height:100%;width:0;background:#6e2430;}

  .msg{margin-top:18px;font-size:16px;font-weight:600;}
  .msg.ok{color:green;}
  .msg.err{color:red;}

  /* Floating hearts */
  .heart{position:fixed;font-size:18px;opacity:.75;
         animation:floatUp linear infinite;pointer-events:none;z-index:1;}
  @keyframes floatUp{
    0%{transform:translateY(0) scale(1);opacity:.9;}
    100%{transform:translateY(-120vh) scale(1.4);opacity:0;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">Upload New Memory</div>
  <nav>
    <a href="life.html">Back to Life</a>
    <a href="gallery.html">Gallery</a>
    <a href="/auth/logout">Logout</a>
  </nav>
</header>

<main>
  <form id="uploadForm">
    <label>Choose a Photo:</label>
    <input type="file" id="file" name="file" accept="image/*" required />

    <label>Write a Caption:</label>
    <textarea id="caption" name="caption" placeholder="Add a sweet caption..." required></textarea>

    <button type="submit">Upload Memory</button>

    <div class="progress"><div></div></div>
    <div id="msg" class="msg"></div>
  </form>
</main>

<script>
/* floating hearts background */
const colors=["#ffd6e0","#ffb7c5","#ffd27a","#ffc4a3","#ffffffaa"];
function spawnHeart(){
  const h=document.createElement("div");
  h.className="heart";
  h.textContent=Math.random()>0.5?"❤":"♡";
  h.style.left=(2+Math.random()*96)+"vw";
  h.style.bottom="-24px";
  h.style.fontSize=(10+Math.random()*22)+"px";
  h.style.color=colors[(Math.random()*colors.length)|0];
  h.style.animationDuration=(10+Math.random()*10)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),20000);
}
for(let i=0;i<25;i++) setTimeout(spawnHeart,i*180);
setInterval(spawnHeart,800);

/* upload logic */
const form=document.getElementById("uploadForm");
const bar=document.querySelector(".progress div");
const wrap=document.querySelector(".progress");
const msg=document.getElementById("msg");

form.addEventListener("submit",async e=>{
  e.preventDefault();
  const file=document.getElementById("file").files[0];
  const caption=document.getElementById("caption").value.trim();
  if(!file||!caption){alert("Please select file and caption");return;}

  const fd=new FormData();
  fd.append("file",file);
  fd.append("caption",caption);

  wrap.style.display="block";
  bar.style.width="0%";
  msg.textContent="";

  try{
    const res=await authFetch("/api/upload",{method:"POST",body:fd,onUploadProgress:prog=>{
      if(prog.lengthComputable){
        const pct=(prog.loaded/prog.total*100).toFixed(0);
        bar.style.width=pct+"%";
      }
    }});
    if(res.ok){
      bar.style.width="100%";
      msg.textContent="Uploaded successfully! 🎉";
      msg.className="msg ok";
      form.reset();
    }else{
      throw new Error("Upload failed "+res.status);
    }
  }catch(err){
    console.error(err);
    msg.textContent="Error: "+err.message;
    msg.className="msg err";
  }
});
</script>
<!-- START: site-wide background music widget (inserted automatically) -->
<audio id="bgMusic" src="private/gallery-music.mp3" loop preload="metadata"></audio>
<div id="musicWidget" style="position:fixed;right:18px;bottom:18px;z-index:9999;">
  <button id="musicPlayBtn" aria-label="Play or Pause" style="background:#6e2430;color:#fff;border:0;border-radius:999px;padding:8px 12px;cursor:pointer;font-weight:700;">▶</button>
  <input id="musicVol" type="range" min="0" max="1" step="0.05" value="1" title="Volume" style="vertical-align:middle;margin-left:8px;">
</div>
<script>
(function(){
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicPlayBtn');
  const vol = document.getElementById('musicVol');
  const KEY = 'shree_bg_music_v1';
  try {
    const saved = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (saved) {
      if (typeof saved.currentTime === 'number') {
        audio.addEventListener('loadedmetadata', () => {
          if (saved.currentTime < audio.duration - 1) audio.currentTime = saved.currentTime;
        }, { once: true });
      }
      if (typeof saved.volume === 'number') { audio.volume = saved.volume; vol.value = saved.volume; }
      if (saved.playing) {
        audio.play().then(()=> btn.textContent='⏸').catch(()=> btn.textContent='▶');
      } else { btn.textContent='▶'; }
    } else { btn.textContent='▶'; }
  } catch(e){ btn.textContent='▶'; }
  btn.addEventListener('click', async (e) => {
    e.preventDefault();
    if (audio.paused) { try { await audio.play(); btn.textContent='⏸'; saveState(true); } catch(err){ console.warn('Autoplay blocked', err); } }
    else { audio.pause(); btn.textContent='▶'; saveState(false); }
  });
  vol.addEventListener('input', (e)=>{ audio.volume = Number(e.target.value); saveState(!audio.paused); e.stopPropagation(); });
  let saveTimer = null;
  function startSaver(){ if(saveTimer) return; saveTimer = setInterval(()=> saveState(!audio.paused),1500); }
  function stopSaver(){ if(saveTimer){ clearInterval(saveTimer); saveTimer = null; } }
  function saveState(isPlaying){ try { localStorage.setItem(KEY, JSON.stringify({ currentTime: audio.currentTime||0, volume: audio.volume||1, playing: !!isPlaying, ts: Date.now() })); } catch(e){} }
  audio.addEventListener('play', startSaver);
  audio.addEventListener('pause', stopSaver);
  window.addEventListener('beforeunload', ()=> saveState(!audio.paused));
  audio.addEventListener('playing', ()=> btn.textContent='⏸');
  audio.addEventListener('pause', ()=> btn.textContent='▶');
})();
</script>
<!-- END: site-wide background music widget -->
</body>
</html>
